<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>STG | SOVEREIGN TABLET HUD</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --bg: #020617; }
        body { background: var(--bg); color: white; font-family: 'Share Tech Mono', monospace; margin: 0; overflow: hidden; }
        
        /* LAYAR LEBAR 10 INCH OPTIMIZATION */
        .tablet-hud { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 5px solid #111; box-shadow: inset 0 0 100px rgba(0,242,255,0.2); }
        
        /* RADAR NASA GAHAR */
        .radar-box { width: 300px; height: 300px; border: 2px solid var(--neon); border-radius: 50%; position: relative; margin-bottom: 30px; }
        .radar-box::after { content: ""; position: absolute; width: 50%; height: 2px; background: var(--neon); top: 50%; left: 50%; transform-origin: left; animation: scan 4s linear infinite; }
        
        /* AKSARA RUNNING TEXT */
        .aksara-scroll { color: var(--gold); font-size: 1.5rem; letter-spacing: 10px; margin: 20px; }
        
        /* STATUS PANEL */
        .status-panel { background: rgba(255,215,0,0.05); border: 1px dashed var(--gold); padding: 20px; text-align: left; width: 80%; }
        
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .glitch { font-size: 2rem; color: var(--neon); text-shadow: 2px 2px var(--gold); }
    </style>
</head>
<body>
    <div class="tablet-hud">
        <div class="glitch">SOVEREIGN TITAN : TABLET MODE</div>
        <div class="radar-box"></div>
        
        <div class="aksara-scroll">
            ꦲꦯꦤꦕꦫꦏꦢꦶꦱꦮꦭꦥꦝꦶꦩꦒ
        </div>
        
        <div class="status-panel">
            <p>🛰️ SONAR: MONITORING ZURICH-JAKARTA PATH...</p>
            <p>🔐 SQID: 0x7CCF5BEEE89D58E9 [QUANTUM-ACTIVE]</p>
            <p>☕ BEVERAGE: KOPI MANIS SULTAN (NO BITTERNESS!)</p>
            <p>🏛️ MOTTO: SATU UNTUK SEMUA, SEMUA UNTUK SATU</p>
        </div>
    </div>
</body>
</html>
